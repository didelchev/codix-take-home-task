<div class="overlay" (click)="onClose()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-topside">
        <div class="modal-header">
            <h3 class="modal-title">Transaction #{{transaction?.id}}</h3>
            <button class="close-btn" (click)="onClose()">✕</button>
        </div>
        <div class="amount-display">
            <div class="amount-value">{{transaction?.amount | customCurrency}}</div>
            <span class="status-badge" [ngClass]="transaction!.status.toLowerCase()">{{transaction?.status}}</span>
            <span class="type-badge" [ngClass]="transaction!.type.toLowerCase()">{{transaction?.type}}</span>
        </div>
    </div>

    <div class="detail-list">
      <div class="detail-row">
        <span class="detail-label">Name</span>
        <span class="detail-value">{{ transaction?.name }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Date</span>
        <span class="detail-value">{{ transaction?.date | customDate}}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">City</span>
        <span class="detail-value">{{ transaction?.city }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Bank card</span>
        <span class="detail-value">{{ transaction?.bankCard }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">BIC</span>
        <span class="detail-value">{{ transaction?.bic }}</span>
      </div>

    </div>

  </div>
</div>
